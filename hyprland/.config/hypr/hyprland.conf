# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=,preferred,auto-left,1
monitor=eDP-1,2560x1600@60,auto,1.25
monitor=DP-1,preferred,auto-left,1


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = ghostty
$fileManager = dolphin
$menu = vicinae toggle

$screenshot_dir = ~/Pictures/Screenshots

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = systemctl --user start hyprpolkitagent
# exec-once = $terminal
# exec-once = hyprpaper
# exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = systemctl --user start hyprpolkitagent
exec-once = hyprsunset
exec-once = hypridle
exec-once = swww-daemon

exec-once = nm-applet & blueman-applet
exec-once = swaync
exec-once = clipse -listen # run listener on startup
exec-once = hyprpm reload
exec-once = waybar
exec-once = vicinae server




# execr-once = sleep 2 && pkill -SIGUSR1 waybar

env = XDG_MENU_PREFIX,arch-
execr = sh /home/manoj/.config/hypr/scripts/refresh_rate_init.sh
execr = sh /usr/bin/LidSwitch.sh
execr = kbuildsycoca6


#############################
### ENVIRONMENT VARIABLES ###
#############################


# See https://wiki.hypr.land/Configuring/Environment-variables/
env = HYPRCURSOR_SIZE,28
env = HYPRCURSOR_THEME, rose-pine-hyprcursor

env = QT_QPA_PLATFORM=wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = ELECTRON_OZONE_PLATFORM_HINT,auto

env = AQ_DRM_DEVICES,/dev/dri/card1:/dev/dri/card0
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

ecosystem {
  enforce_permissions = 1
}

permission = /usr/(bin|local/bin)/grim, screencopy, allow
permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
permission = /usr/(bin|local/bin)/hyprlock, screencopy, allow
permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


xwayland {
    force_zero_scaling = true
}

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 0
    gaps_out = 0

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    # col.active_border = rgba(5090aa5e)
    col.active_border = rgba(6f6f6fff)
    col.inactive_border = rgba(00000000)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}


# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 0
    rounding_power = 0

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 8
        passes = 2

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    # enabled = yes, please :)
    enabled = no

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/ for more

    # bezier = easeOutQuint,0.23,1,0.32,1
    # bezier = easeInOutCubic,0.65,0.05,0.36,1
    # bezier = linear,0,0,1,1
    # bezier = almostLinear,0.5,0.5,0.75,1.0
    # bezier = quick,0.15,0,0.1,1
    #
    # animation = global, 1, 10, default
    # animation = border, 1, 5.39, easeOutQuint
    # animation = windows, 1, 4.79, easeOutQuint
    # animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    # animation = windowsOut, 1, 1.49, linear, popin 87%
    # animation = fadeIn, 1, 1.73, almostLinear
    # animation = fadeOut, 1, 1.46, almostLinear
    # animation = fade, 1, 3.03, quick
    # animation = layers, 1, 3.81, easeOutQuint
    # animation = layersIn, 1, 4, easeOutQuint, fade
    # animation = layersOut, 1, 1.5, linear, fade
    # animation = fadeLayersIn, 1, 1.79, almostLinear
    # animation = fadeLayersOut, 1, 1.39, almostLinear
    # animation = workspaces, 1, 1.94, almostLinear, fade
    # animation = workspacesIn, 1, 1.21, almostLinear, fade
    # animation = workspacesOut, 1, 1.94, almostLinear, fade
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

group {
    col.border_active = rgba(6f6f6fff)
    col.border_inactive = rgba(00000000)

    groupbar {
        font_size = 12
        font_weight_active = bold
        col.active = rgba(5090aaee)
        col.inactive = rgba(595959aa)
    }

}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    enable_anr_dialog = false
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    vfr = true
    vrr = 1
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = gb
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    resolve_binds_by_sym = 1

    follow_mouse = 1

    sensitivity = 0.25 # -1.0 - 1.0, 0 means no modification.
    scroll_factor = 1.5

    touchpad {
        scroll_factor = 0.7
        natural_scroll = true
    }

}

# https://wiki.hypr.land/Configuring/Variables/#gestures
gestures {
    # workspace_swipe = true
    # workspace_swipe_forever = true
    gesture = 4, horizontal, workspace
    gesture = 3, pinch, fullscreen, maximise
}

# per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
  name = keychron-keychron-k2
  kb_layout = us
}
device {
  name = keychron-keychron-k2-2
  kb_layout = us
}

# Increaced sensitivity for touchpad
device {
  name = elan06fa:00-04f3:327e-touchpad
  sensitivity = 0.1 # -1.0 - 1.0, 0 means no modification.
}

plugin {
    hyprexpo {
        columns = 3
        gap_size = 5
        bg_col = rgb(111111)
        workspace_method = center current # [center/first] [workspace] e.g. first 1 or center m+1

        gesture_distance = 300 # how far is the "max" for the gesture
    }
}


###################
### KEYBINDINGS ###
###################
# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, return, exec, $terminal
bind = $mainMod, Q, forcekillactive,
bind = $mainMod, W, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, Z, exec, zeditor
# bind = $mainMod, F, exec, firefox
bind = $mainMod, B, exec,[workspace unset] brave
bind = $mainMod SHIFT, F, togglefloating,
bind = $mainMod, space, exec, $menu
# bind = $mainMod, P, pseudo, # dwindle; i don't use this, lol
bind = $mainMod, U, togglesplit, # dwindle
bind = $mainMod, I, swapsplit, # dwindle
# bind = $mainMod, N, swapnext,
# bind = $mainMod SHIFT, N, swapnext, prev
bind = $mainMod, N, layoutmsg, movetoroot
bind = $mainMod, F, fullscreen, 1 # dwindle; '1' for maximising
bind = $mainMod, P, movecurrentworkspacetomonitor, +1
bind = $mainMod SHIFT, P, movecurrentworkspacetomonitor, -1

bindr = ALT, ALT_L, exec, pkill -SIGUSR1 waybar

# Group actions
# Move focus with mainMod + arrow keys
bind = $mainMod, G, togglegroup,
bind = ALT, TAB, changegroupactive,
bind = $mainMod SHIFT, H, movewindoworgroup, l
bind = $mainMod SHIFT, L, movewindoworgroup, r
bind = $mainMod SHIFT, K, movewindoworgroup, u
bind = $mainMod SHIFT, J, movewindoworgroup, d

bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod SHIFT, N, exec, swaync-client -t -sw

# bind = $mainMod ALT, L, exec, pidof hyprlock || hyprlock

bind = , Print, exec, hyprshot -m region --clipboard-only
bind = $mainMod, Print, exec, hyprshot -m region -o $screenshot_dir
bind = SHIFT, Print, exec, hyprshot -m window

bind = $mainMod, V, exec, [float; size 622 652; workspace unset] $terminal -e clipse

# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, focusworkspaceoncurrentmonitor, 1
bind = $mainMod, 2, focusworkspaceoncurrentmonitor, 2
bind = $mainMod, 3, focusworkspaceoncurrentmonitor, 3
bind = $mainMod, 4, focusworkspaceoncurrentmonitor, 4
bind = $mainMod, 5, focusworkspaceoncurrentmonitor, 5
bind = $mainMod, 6, focusworkspaceoncurrentmonitor, 6
bind = $mainMod, 7, focusworkspaceoncurrentmonitor, 7
bind = $mainMod, 8, focusworkspaceoncurrentmonitor, 8
bind = $mainMod, 9, focusworkspaceoncurrentmonitor, 9
bind = $mainMod, 0, focusworkspaceoncurrentmonitor, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod CTRL, 1, movetoworkspace, 1
bind = $mainMod CTRL, 2, movetoworkspace, 2
bind = $mainMod CTRL, 3, movetoworkspace, 3
bind = $mainMod CTRL, 4, movetoworkspace, 4
bind = $mainMod CTRL, 5, movetoworkspace, 5
bind = $mainMod CTRL, 6, movetoworkspace, 6
bind = $mainMod CTRL, 7, movetoworkspace, 7
bind = $mainMod CTRL, 8, movetoworkspace, 8
bind = $mainMod CTRL, 9, movetoworkspace, 9
bind = $mainMod CTRL, 0, movetoworkspace, 10

# Move to the next/prev workspace
# Scroll through existing workspaces with mainMod + CTRL + Vim bindings
bind = $mainMod CTRL, L, focusworkspaceoncurrentmonitor, r+1 
bind = $mainMod CTRL, H, focusworkspaceoncurrentmonitor, r-1 

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod ALT, S, movetoworkspace, special:magic
bind = $mainMod SHIFT, S, movetoworkspacesilent, special:magic

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, focusworkspaceoncurrentmonitor, r+1
bind = $mainMod, mouse_up, focusworkspaceoncurrentmonitor, r-1

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindel = $mainMod,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = $mainMod, F5, exec, brightnessctl -d platform::kbd_backlight s 1-
bindel = $mainMod, F6, exec, brightnessctl -d platform::kbd_backlight s +1
bindel = $mainMod,XF86MonBrightnessDown, exec, brightnessctl -d platform::kbd_backlight s 1- 
bindel = $mainMod,XF86MonBrightnessUp, exec, brightnessctl -d platform::kbd_backlight s +1 

# Requires playerctl
bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPause, exec, playerctl play-pause
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioPrev, exec, playerctl previous



bindl = $mainMod ALT, P ,exec, hyprctl keyword monitor "eDP-1,preferred,auto,1.25"

# Power menu binding
bindl = $mainMod SHIFT, Q, exec, loginctl unlock-session && (pidof wlogout || wlogout --margin-top 530 --margin-bottom 530 --margin-right 750 --margin-left 750)

binde = $mainMod, equal, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
binde = $mainMod, minus, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')
binde = $mainMod, KP_ADD, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
binde = $mainMod, KP_SUBTRACT, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')

bind = $mainMod SHIFT, 0, exec, hyprctl -q keyword cursor:zoom_factor 1

## HyprExpo
# This will toggle HyprExpo when SUPER+TAB is pressed
bind = $mainMod, TAB, hyprexpo:expo, toggle

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$

# Rules for network, bluetooth, volume and password managers
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(com.saivert.pwvucontrol)$
windowrule = float on, match:title ^(Bitwarden)$



# Rules for PiP
windowrule = float on, workspace unset, pin on, match:title ^(Picture-in-picture)$



# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppress_event maximize, match:class .*

# Fix some dragging issues with XWayland
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# Layer rules
layerrule = blur on, match:namespace waybar
layerrule = blur on, match:namespace rofi
layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, above_lock true, match:namespace logout_dialog
layerrule = blur on, match:namespace vicinae
# layerrule = ignorealpha 0, vicinae


# Rules for apps
windowrule = workspace 2, match:class (code)
windowrule = workspace 3, match:class (com.mitchellh.ghostty)
windowrule = workspace 4, match:class (brave-browser)
windowrule = group set [always], match:class (brave-browser)
windowrule = workspace 5, match:class (obsidian)
# windowrule = workspace 6,class:(brave-enllinibdlcnlfodcebidpeepangegen-Default) # Canvas

workspace = 1, monitor:DP-1, default:true, persistent:true
workspace = 2, monitor:DP-1, persistent:true
workspace = 3, monitor:DP-1, persistent:true
workspace = 4, monitor:DP-1, persistent:true
workspace = 5, monitor:DP-1, persistent:true

workspace = 1, monitor:eDP-1, default:true, persistent:true
workspace = 2, monitor:eDP-1, persistent:true
workspace = 3, monitor:eDP-1, persistent:true
workspace = 4, monitor:eDP-1, persistent:true
workspace = 5, monitor:eDP-1, persistent:true

# Opening apps silently
exec-once = [workspace 3 silent] $terminal
exec-once = [workspace 4 silent] brave
exec-once = hyprctl dispatch workspace 1
