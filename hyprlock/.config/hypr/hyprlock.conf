source = $HOME/.config/hypr/mocha.conf

$accent = $sky
$accentAlpha = $skyAlpha
$font = JetBrainsMono Nerd Font

# GENERAL
general {
    # hide_cursor = true
}

# BACKGROUND
background {
    path = screenshot
    blur_passes = 2
    color = $base
}

# TIME
label {
    text = cmd[update:30000] echo "$(date +"%R")"
    color = $text
    font_size = 80
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, -150
    halign = center
    valign = top
}

# DATE
label {
    text = cmd[update:43200000] echo "$(date +"%A, %d %B")"
    color = $text
    font_size = 16
    font_family = $font
    position = 0, -300
    halign = center
    valign = top
}

# USER AVATAR
image {
    path = ~/.face
    size = 150
    border_color = $accent
    border_size = 2

    position = 0, 100
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    size = 300, 45
    outline_thickness = 1
    dots_size = 0.075
    dots_spacing = 0.2
    dots_center = true
    outer_color = $accent
    inner_color = $surface0
    rounding = 1
    font_color = $text
    fade_on_empty = false
    placeholder_text = <span foreground="##$textAlpha"><b>Hello, there...</b></span>
    hide_input = false
    check_color = $accent
    fail_color = $red
    fail_text = <span>$FAIL <b>[$ATTEMPTS]</b></span>
    capslock_color = $yellow
    position = 0, -45
    halign = center
    valign = center
}

# BATTERY
label {
    font_family = $font
    font_color = $text
    text = cmd[update:30000] echo "󱐌 $(cat /sys/class/power_supply/BAT0/capacity)%"
    color = rgba(255, 255, 255, 0.8)
    font_size = 14
    position = -50, -50
    halign = right
    valign = top
}
